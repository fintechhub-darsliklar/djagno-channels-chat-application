<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - {{ user.username }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f4f5; }
        .action-hover:hover { background-color: rgba(51, 144, 236, 0.08); }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="bg-white border-b sticky top-0 z-20">
        <div class="max-w-md mx-auto flex items-center p-3">
            <a href="{% url 'index' %}" class="p-2 hover:bg-gray-100 rounded-full text-[#3390ec] transition">
                <i class="fa-solid fa-arrow-left text-xl"></i>
            </a>
            <h1 class="ml-4 font-bold text-lg text-gray-800">Profil</h1>
            <button class="ml-auto p-2 hover:bg-gray-100 rounded-full text-gray-500">
                <i class="fa-solid fa-pen text-sm"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto">
        <div class="max-w-md mx-auto">
            
            <div class="bg-white py-8 px-4 text-center border-b shadow-sm">
                <div class="relative inline-block">
                    <img src="https://ui-avatars.com/api/?name={{ user.username }}&size=128&background=3390ec&color=fff" 
                         class="w-24 h-24 rounded-full border-2 border-blue-50 mx-auto object-cover" 
                         alt="Avatar">
                    <label class="absolute bottom-0 right-0 bg-[#3390ec] text-white p-2 rounded-full border-4 border-white cursor-pointer hover:bg-[#2b7abd] transition">
                        <i class="fa-solid fa-camera text-xs"></i>
                        <input type="file" class="hidden">
                    </label>
                </div>
                <h2 class="mt-4 text-xl font-bold text-gray-900">{{ user.get_full_name|default:user.username }}</h2>
                <p class="text-gray-500 text-sm">@{{ user.username }}</p>
            </div>

            <div class="mt-4 bg-white border-y divide-y">
                <div class="flex items-center p-4 action-hover cursor-pointer transition">
                    <div class="w-10 text-[#3390ec] text-center">
                        <i class="fa-solid fa-circle-info text-lg"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-900">Bio</p>
                        <p class="text-[13px] text-gray-500">Loyiha ishlab chiquvchisi va dizayner</p>
                    </div>
                </div>

                <div class="flex items-center p-4 action-hover cursor-pointer transition">
                    <div class="w-10 text-[#3390ec] text-center">
                        <i class="fa-solid fa-at text-lg"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-900">Foydalanuvchi nomi</p>
                        <p class="text-[13px] text-gray-500">@{{ user.username }}</p>
                    </div>
                </div>
            </div>

            <h3 class="p-4 pt-6 text-[13px] font-bold text-[#3390ec] uppercase tracking-wider">Sozlamalar</h3>
            <div class="bg-white border-y divide-y">
                <div class="flex items-center p-4 action-hover cursor-pointer transition">
                    <div class="w-10 text-gray-400 text-center">
                        <i class="fa-solid fa-bell text-lg"></i>
                    </div>
                    <div class="ml-4 flex-1">
                        <p class="text-[15px] text-gray-800">Bildirishnomalar</p>
                    </div>
                    <div class="text-xs text-[#3390ec]">Yoqilgan</div>
                </div>

                <div class="flex items-center p-4 action-hover cursor-pointer transition">
                    <div class="w-10 text-gray-400 text-center">
                        <i class="fa-solid fa-lock text-lg"></i>
                    </div>
                    <div class="ml-4 flex-1">
                        <p class="text-[15px] text-gray-800">Maxfiylik</p>
                    </div>
                </div>

                <div class="flex items-center p-4 action-hover cursor-pointer transition">
                    <div class="w-10 text-gray-400 text-center">
                        <i class="fa-solid fa-globe text-lg"></i>
                    </div>
                    <div class="ml-4 flex-1 text-left">
                        <p class="text-[15px] text-gray-800">Til</p>
                    </div>
                    <div class="text-xs text-gray-400">O'zbekcha</div>
                </div>
            </div>

            <div class="mt-4 mb-10 bg-white border-y">
                <a href="{% url 'logout' %}" class="flex items-center p-4 text-red-500 hover:bg-red-50 transition">
                    <div class="w-10 text-center">
                        <i class="fa-solid fa-arrow-right-from-bracket text-lg"></i>
                    </div>
                    <span class="ml-4 font-medium">Chiqish</span>
                </a>
            </div>

        </div>
    </main>

    <nav class="bg-white border-t flex justify-around p-3 text-gray-400 sticky bottom-0">
        <a href="{% url 'index' %}" class="text-center flex flex-col items-center">
            <i class="fa-solid fa-message text-xl"></i>
            <span class="text-[10px] mt-1">Chatlar</span>
        </a>
        <a href="#" class="text-[#3390ec] text-center flex flex-col items-center">
            <i class="fa-solid fa-circle-user text-xl"></i>
            <span class="text-[10px] mt-1">Profil</span>
        </a>
    </nav>

</body>
</html>
